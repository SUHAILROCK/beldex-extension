<html lang="en">
<head>
<meta charset="UTF-8">
<title>BelScope — Chart</title>
<style>

  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
}
/* Space Mono Regular — latin-ext */
@font-face {
  font-family: 'Space Mono'; font-style: normal; font-weight: 400; font-display: swap;
  src: url('fonts/i7dPIFZifjKcF5UAWdDRYE98RWq7.woff2') format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
}
/* Space Mono Bold — latin */
@font-face {
  font-family: 'Space Mono'; font-style: normal; font-weight: 700; font-display: swap;
  src: url('fonts/i7dMIFZifjKcF5UAWdDRaPpZUFWaHg.woff2') format('woff2');
  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
}
/* Space Mono Bold — latin-ext */
@font-face {
  font-family: 'Space Mono'; font-style: normal; font-weight: 700; font-display: swap;
  src: url('fonts/i7dMIFZifjKcF5UAWdDRaPpZUFuaHjyV.woff2') format('woff2');
  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
}

:root {
  --bg: #04080f;
  --s1: #080f1a;
  --s2: #0d1623;
  --s3: #111d2e;
  --gold: #f5a623;
  --gold2: #ffd166;
  --glow: rgba(245,166,35,0.18);
  --green: #06d6a0;
  --red: #ef476f;
  --blue: #118ab2;
  --purple: #a855f7;
  --cyan: #00d4ff;
  --text: #e2ecf8;
  --muted: #4a6080;
  --dim: #1a2840;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  overflow-y: auto;
  overflow-x: hidden;
  min-height: 100vh;
}

body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999; opacity:0.4;
}

/* ── HEADER ── */
.sp-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  background: linear-gradient(135deg, var(--s2), var(--s1));
  border-bottom: 1px solid var(--border2);
  position: relative; overflow: hidden;
}
.sp-hdr::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.sp-hdr-left {
  display: flex; align-items: center; gap: 10px;
}
.sp-hdr-icon {
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(245,166,35,0.4));
}
.sp-hdr-name {
  font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
  color: var(--text);
}
.sp-hdr-name em { color: var(--gold); font-style: normal; }
.sp-hdr-right { display: flex; align-items: center; gap: 8px; }
.live-tag {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.12em;
  color: var(--green); padding: 3px 9px;
  background: rgba(6,214,160,0.08);
  border: 1px solid rgba(6,214,160,0.2);
  border-radius: 20px;
}
.live-blink {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
  animation: blink 1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.1} }

/* ── PRICE HERO ── */
.sp-price-hero {
  padding: 18px 18px 14px;
  background: linear-gradient(160deg, var(--s2) 0%, var(--s1) 100%);
  border-bottom: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.sp-price-hero::after {
  content: 'BDX';
  position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 56px; font-weight: 700; color: rgba(245,166,35,0.04);
  letter-spacing: -2px; pointer-events: none;
}
.sp-ph-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 4px;
}
.sp-ph-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--muted); letter-spacing: 0.12em;
}
.curr-sw {
  display: flex; background: var(--dim); border-radius: 4px; padding: 2px; gap: 2px;
}
.csw-btn {
  font-family: 'Space Mono', monospace;
  font-size: 8px; padding: 3px 8px; border-radius: 3px;
  border: none; cursor: pointer; background: transparent;
  color: var(--muted); transition: all 0.15s; letter-spacing: 0.06em;
}
.csw-btn.on { background: var(--gold); color: #000; font-weight: 700; }
.sp-price {
  font-family: 'Space Mono', monospace;
  font-size: 30px; font-weight: 700; letter-spacing: -1px;
  background: linear-gradient(135deg, #fff 0%, var(--gold2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.1; margin: 6px 0 8px;
}
.sp-meta {
  display: flex; align-items: center; gap: 10px;
}
.sp-change {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 4px;
}
.sp-change.up { color: var(--green); background: rgba(6,214,160,0.12); }
.sp-change.dn { color: var(--red); background: rgba(239,71,111,0.12); }
.sp-change.nt { color: var(--muted); background: var(--dim); }
.sp-inr {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--muted);
}

/* ── CHART SECTION ── */
.chart-section {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
}
.chart-controls {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  border-bottom: 1px solid var(--border);
}
.range-btns {
  display: flex; gap: 4px;
}
.range-btn {
  font-family: 'Space Mono', monospace;
  font-size: 10px; padding: 5px 12px; border-radius: 4px;
  border: 1px solid var(--border2); cursor: pointer;
  background: transparent; color: var(--muted);
  transition: all 0.15s; letter-spacing: 0.04em;
}
.range-btn:hover { color: var(--text); border-color: var(--muted); }
.range-btn.on {
  background: var(--gold); color: #000; font-weight: 700;
  border-color: var(--gold);
}
.chart-type-btns {
  display: flex; gap: 4px;
}
.ct-btn {
  width: 28px; height: 28px; border-radius: 4px;
  border: 1px solid var(--border2); cursor: pointer;
  background: transparent; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.ct-btn:hover { color: var(--text); border-color: var(--muted); }
.ct-btn.on { background: var(--dim); color: var(--gold); border-color: rgba(245,166,35,0.3); }

#chart-container {
  width: 100%;
  height: 300px;
  position: relative;
}
.chart-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
}
.chart-loading.hide { display: none; }

/* ── STAT BAND ── */
.sp-stat-band {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  border-bottom: 1px solid var(--border);
}
.sp-sb-cell {
  padding: 12px 14px; border-right: 1px solid var(--border);
  position: relative;
}
.sp-sb-cell:last-child { border-right: none; }
.sp-sb-cell::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1.5px;
}
.sbc-gold::before { background: var(--gold); }
.sbc-green::before { background: var(--green); }
.sbc-purple::before { background: var(--purple); }
.sp-sb-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 5px;
}
.sp-sb-val { font-size: 13px; font-weight: 700; }
.sp-sb-val.gold { color: var(--gold); }
.sp-sb-val.green { color: var(--green); }
.sp-sb-val.purple { color: var(--purple); }

/* ── PRICE ROWS ── */
.sp-price-rows { padding: 6px 0; border-bottom: 1px solid var(--border); }
.sp-pr-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 18px; border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s;
}
.sp-pr-row:last-child { border-bottom: none; }
.sp-pr-row:hover { background: rgba(255,255,255,0.015); }
.sp-pr-left { display: flex; align-items: center; gap: 10px; }
.sp-pr-icon {
  width: 26px; height: 26px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pri-green { background: rgba(6,214,160,0.1); }
.pri-red { background: rgba(239,71,111,0.1); }
.pri-gold { background: rgba(245,166,35,0.1); }
.sp-pr-label { font-size: 11px; color: var(--muted); }
.sp-pr-val { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; }
.sp-pr-val.green { color: var(--green); }
.sp-pr-val.red { color: var(--red); }
.sp-pr-val.gold { color: var(--gold); }

/* ── NETWORK SECTION ── */
.sp-net-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px; background: var(--s2);
  border-bottom: 1px solid var(--border);
}
.sp-net-title {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em; color: var(--muted);
  text-transform: uppercase;
}
.sp-net-sync {
  font-family: 'Space Mono', monospace;
  font-size: 8px; color: var(--muted);
}
.sp-net-sync span { color: var(--cyan); }

.sp-net-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
}
.sp-nr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--s1);
  transition: background 0.15s;
}
.sp-nr:hover { background: rgba(255,255,255,0.02); }
.sp-nr-left { display: flex; align-items: center; gap: 8px; }
.sp-nr-ico {
  width: 26px; height: 26px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ni-gold { background: rgba(245,166,35,0.1); }
.ni-green { background: rgba(6,214,160,0.1); }
.ni-red { background: rgba(239,71,111,0.1); }
.ni-purple { background: rgba(168,85,247,0.1); }
.ni-blue { background: rgba(0,212,255,0.1); }
.ni-dim { background: var(--dim); }
.ni-orange { background: rgba(255,152,0,0.1); }
.sp-nr-label { font-size: 10px; color: var(--text); font-weight: 500; }
.sp-nr-right { display: flex; align-items: center; gap: 5px; }
.sp-nr-val {
  font-family: 'Space Mono', monospace;
  font-size: 11px; font-weight: 700;
}
.sp-nr-val.gold { color: var(--gold); }
.sp-nr-val.green { color: var(--green); }
.sp-nr-val.red { color: var(--red); }
.sp-nr-val.purple { color: var(--purple); }
.sp-nr-val.cyan { color: var(--cyan); }
.sp-nr-val.orange { color: #ff9800; }
.sp-nr-val.dim { color: var(--muted); }
.sp-live-pip {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 4px var(--green);
  flex-shrink: 0;
}

/* ── FOOTER ── */
.sp-footer {
  padding: 10px 18px;
  font-family: 'Space Mono', monospace;
  font-size: 8px; color: var(--muted); text-align: center;
  letter-spacing: 0.06em;
}
.sp-footer span { color: var(--gold); }
</style>
</head>
